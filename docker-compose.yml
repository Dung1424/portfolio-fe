# Run from this directory (same folder as package.json):
#   docker compose up --build
# If you run from a parent folder, ./:/app will not contain this project -> ENOENT for package.json.
# Cần file .env (sao chép từ .env.example).

services:
  fe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_fe
    restart: unless-stopped
    # No host port — use portfolio-gateway at http://localhost:8088
    # To debug Nuxt directly, add: ports: [ "3000:3000" ]
    env_file:
      - .env
    # Bắt buộc inject vào process Node: Nuxt đọc NUXT_PUBLIC_* khi khởi động; chỉ có .env đôi khi không vào process → fallback cũ trỏ 3010.
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8088}
      NUXT_PUBLIC_CHAT_API: ${NUXT_PUBLIC_CHAT_API:-http://localhost:8088}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:8088}
    volumes:
      - ./:/app
      - fe_node_modules:/app/node_modules
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "test -f /app/package.json || { echo 'ERROR: /app/package.json missing. cd into the folder that contains package.json, then docker compose up --build'; exit 1; }; exec npm run dev -- --host 0.0.0.0 --port 3000",
      ]
    networks:
      - portfolio_net

volumes:
  fe_node_modules:

networks:
  portfolio_net:
    external: true
