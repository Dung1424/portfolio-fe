# Run from this directory (same folder as package.json):
#   docker compose up --build
# If you run from a parent folder, ./:/app will not contain this project -> ENOENT for package.json.

version: "3.8"

services:
  fe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_fe
    restart: unless-stopped
    # No host port — use portfolio-gateway at http://localhost:8088
    # To debug Nuxt directly, add: ports: [ "3000:3000" ]
    env_file:
      - .env
    volumes:
      - ./:/app
      - fe_node_modules:/app/node_modules
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "test -f /app/package.json || { echo 'ERROR: /app/package.json missing. cd into the folder that contains package.json, then docker compose up --build'; exit 1; }; exec npm run dev -- --host 0.0.0.0 --port 3000",
      ]
    networks:
      - portfolio_net

volumes:
  fe_node_modules:

networks:
  portfolio_net:
    external: true
